<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
    <br><br>

    <div class="container text-light rounded text-center" style="height: 550px; width: 550px; background-color: #682e2e;">

    <h1 class="fw-bold display-4 fst-italic">Log In</h1>
    <br>

    <div id="form-box">

    <form action ="">

        <label for = "">Email:</label>
        <br>
        <input type = "text" class="form-control rounded" id = "Email" name = "Your Email" placeholder = "Your Email:" size="40">
        <br>

        <label for = "">Password:</label>
        <br>
        <input type = "text" id = "Password" name = "Your Password" placeholder = "Your Password:" class="form-control rounded" size="40">

        <div class="text-center">
         <a href="" class="text-light">Forgot Password?</a>
        </div>
        <br><br>

        <div class="row">
          <div class="col-6">

        <input type="reset" id="reset" name="reset" value="Clear all" class="form-control rounded">
        </div>

             <div class="col-6">
        <button type="button" onclick="login()" class="form-control rounded">
         Log In
        </button>
            </div>

        </form>
         </div>
            
        </div>
        </div></div>

    <script>
        function login(){
            let email = document.getElementById("Email").value;
            let password = document.getElementById("Password").value;

            if(email === "" || password === ""){
                alert("Please fill in all fields.");
                return;
            }

            if(email === "UrbanoisGOAT@gmail.com" && password === "GOAT1234"){
                window.location.href = "Notebooks.html";
            } else {
                alert("Invalid email or password.");
            }
        }
        
        
    </script>
